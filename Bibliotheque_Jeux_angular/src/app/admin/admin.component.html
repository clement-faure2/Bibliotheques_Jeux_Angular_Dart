<section id="games" class="container mt-4">
    <h1>Ma Bibliothèque de Jeux</h1>

    <form id="form" class="game-form mb-5" (ngSubmit)="onSubmit()">
        <h2>{{isEditing ? 'Modifier le jeu' : 'Ajouter un nouveau jeu'}}</h2>

        <label for="title">Titre du jeu :</label>
        <input type="text" placeholder="Nom du jeu" [(ngModel)]="game.title" name="title" required>
        <label for="platform">Plateforme :</label>
        <select id="platform" [(ngModel)]="game.platform" name="platform" class="form-select" required>
            <option value="PC">PC</option>
            <option value="PS5">PlayStation 5</option>
            <option value="Xbox">Xbox Series</option>
            <option value="Switch">Nintendo Switch</option>
        </select>      
        <label for="status">Statut :</label>
        <select id="status" [(ngModel)]="game.status" name="status" class="form-select">
            <option value="à faire">À faire</option>
            <option value="en cours">En cours</option>
            <option value="terminé">Terminé</option>
        </select>

        <label for="playtime">Temps de jeu (heures) :</label>
        <input type="number" id="playtime" [(ngModel)]="game.playtime" name="playtime">
        <label for="rating">Note (sur 10) :</label>
        <input type="number" id="rating" [(ngModel)]="game.rating" name="rating" min="0" max="10" placeholder="Ex: 8">
        <label for="coverImage">Lien de l'image :</label>
        <input type="text" id="coverImage" [(ngModel)]="game.coverImage" name="coverImage" placeholder="URL de l'image">
        <div class="mt-3">
            <button class="submit-button btn btn-primary w-25">{{isEditing ? 'Mettre à jour' : 'Ajouter le jeu'}}</button>
            <button type="button" class="btn btn-danger w-25" (click)="resetForm()">Annuler</button>
    </div>
    </form>

    <table class="table align-middle"> 
    <thead> 
        <tr>
            <th>Image</th> 
            <th>Titre</th>
            <th>Plateforme</th>
            <th>Statut</th>
            <th>Note</th>
            <th>Actions</th>
        </tr>
    </thead>
        <tbody>
            <tr *ngFor="let g of games">
                <td>
                    <img [src]="g.coverImage || 'https://placehold.co/50x70?text=No+Img'" 
                         alt="cover" 
                         style="width: 50px; height: 70px; object-fit: cover; border-radius: 4px;">
                </td>
                <td>{{ g.title }}</td>
                <td>{{ g.platform }}</td>
                <td>{{ g.status }}</td>
                <td>{{ g.rating ? g.rating + '/10' : '-' }}</td>
                <td>
                    <div class="d-flex flex-column flex-lg-row gap-2 justify-content-center">
                        <button class="btn btn-info text-white" [routerLink]="['/game', g.id]">Détail</button>
                        <button class="btn btn-success" (click)="onEdit(g)">Modifier</button>
                        <button class="btn btn-danger" (click)="onDelete(g)">Supprimer</button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</section>
