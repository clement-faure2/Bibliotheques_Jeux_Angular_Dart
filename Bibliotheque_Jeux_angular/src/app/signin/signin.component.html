<section class="login-container">
    <h2>Inscription</h2>
    <div class="form-group">
        <label for="email">Email :</label>
        <input type="email" id="email" placeholder="Saisissez votre adresse mail" [(ngModel)]="email">
    </div>
    <div class="form-group">
        <label for="password">Mot de passe :</label>
        <input type="password" id="password" placeholder="Votre mot de passe" [(ngModel)]="password">
    </div>
    <button class="btn btn-primary w-25" (click)="register()">S'inscrire</button>
    <p class="text-danger" *ngIf="errorMessage">{{errorMessage}}</p>
</section>
